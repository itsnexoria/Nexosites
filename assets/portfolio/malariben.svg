    <text x="740" y="552" fill="white" font-family="Arial" font-size="12" text-anchor="middle" font-weight="600">Wound Care</text>
    <text x="740" y="568" fill="#555" font-family="Arial" font-size="10" text-anchor="middle">Professional dressing</text>
