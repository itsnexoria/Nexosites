  <line x1="450" y1="380" x2="450" y2="430" stroke="#ffffff10" stroke-width="1"/>
  <text x="570" y="400" fill="white" font-family="Arial Black" font-size="18" text-anchor="middle">Europe</text>
  <text x="570" y="420" fill="#666" font-family="Arial" font-size="12" text-anchor="middle">🌍 Region</text>
  <line x1="700" y1="380" x2="700" y2="430" stroke="#ffffff10" stroke-width="1"/>
  <text x="820" y="400" fill="white" font-family="Arial Black" font-size="18" text-anchor="middle">Survival SMP</text>
  <text x="820" y="420" fill="#666" font-family="Arial" font-size="12" text-anchor="middle">⚔️ Mode</text>
  <line x1="950" y1="380" x2="950" y2="430" stroke="#ffffff10" stroke-width="1"/>
  <text x="1050" y="400" fill="white" font-family="Arial Black" font-size="18" text-anchor="middle">200</text>
  <text x="1050" y="420" fill="#666" font-family="Arial" font-size="12" text-anchor="middle">🏆 Max Players</text>
