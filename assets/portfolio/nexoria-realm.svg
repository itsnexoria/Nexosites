  <rect x="0" y="56" width="1200" height="1" fill="#6c47ff" opacity="0.4"/>
  <!-- Logo text -->
  <text x="40" y="37" fill="white" font-family="Arial Black" font-size="18" font-weight="900" letter-spacing="3">NEXORIA</text>
  <!-- Nav items -->
  <text x="320" y="37" fill="#aaa" font-family="Arial" font-size="13">Home</text>
  <text x="390" y="37" fill="#aaa" font-family="Arial" font-size="13">Store</text>
  <text x="450" y="37" fill="#aaa" font-family="Arial" font-size="13">Ranks</text>
  <text x="520" y="37" fill="#aaa" font-family="Arial" font-size="13">Commands</text>
  <text x="630" y="37" fill="#aaa" font-family="Arial" font-size="13">Rules</text>
  <!-- CTA button -->
  <rect x="1060" y="16" width="110" height="28" rx="14" fill="url(#accent)"/>
  <text x="1115" y="34" fill="white" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">⚔ Join Now</text>
