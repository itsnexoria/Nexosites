    <text x="140" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Economy Shop</text>
    <text x="140" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">GUI-based market</text>
    <rect x="248" y="470" width="160" height="130" rx="10" fill="#111128" stroke="#6c47ff22" stroke-width="1"/>
    <text x="328" y="510" fill="#6c47ff" font-size="24" text-anchor="middle">⚔️</text>
    <text x="328" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Skills &amp; RPG</text>
    <text x="328" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">15+ levelling skills</text>
    <rect x="436" y="470" width="160" height="130" rx="10" fill="#111128" stroke="#6c47ff22" stroke-width="1"/>
    <text x="516" y="510" fill="#6c47ff" font-size="24" text-anchor="middle">🛡️</text>
    <text x="516" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Land Claims</text>
    <text x="516" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">GriefPrevention</text>
    <rect x="624" y="470" width="160" height="130" rx="10" fill="#111128" stroke="#00e5ff22" stroke-width="1"/>
    <text x="704" y="510" fill="#00e5ff" font-size="24" text-anchor="middle">🎁</text>
    <text x="704" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Crates &amp; Cosmetics</text>
    <text x="704" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">PhoenixCrates</text>
    <rect x="812" y="470" width="160" height="130" rx="10" fill="#111128" stroke="#6c47ff22" stroke-width="1"/>
    <text x="892" y="510" fill="#6c47ff" font-size="24" text-anchor="middle">🏅</text>
    <text x="892" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Tags &amp; Ranks</text>
    <text x="892" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">5 prestige tiers</text>
    <rect x="1000" y="470" width="140" height="130" rx="10" fill="#111128" stroke="#6c47ff22" stroke-width="1"/>
    <text x="1070" y="510" fill="#6c47ff" font-size="24" text-anchor="middle">🔒</text>
    <text x="1070" y="535" fill="white" font-family="Arial" font-size="13" text-anchor="middle" font-weight="600">Anti-Cheat</text>
    <text x="1070" y="555" fill="#555" font-family="Arial" font-size="11" text-anchor="middle">Vulcan</text>
  </g>
