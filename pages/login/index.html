<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login | NexoSites Client Portal</title>
  <meta name="description" content="Log in to your NexoSites client portal to track your project, chat with your developer, and manage your order."/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="canonical" href="https://nexosites.xyz/pages/login/"/>
  <link rel="icon" href="/assets/icons/logo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="/assets/icons/logo.png"/>
  <link rel="manifest" href="/site.webmanifest"/>
  <meta name="theme-color" content="#6c47ff"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../style.css"/>
  <link rel="stylesheet" href="../inner.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>

<div id="loader" role="status" aria-label="Loading NexoSites"><div class="loader-logo-wrap"><div class="loader-ring"></div><div class="loader-ring-2"></div><img src="/assets/icons/logo.png" alt="" class="loader-logo-img" aria-hidden="true"/></div><div class="loader-wordmark">NEXOSITES</div><div class="loader-track"><div class="loader-fill"></div></div></div>
<div id="nav-placeholder"></div>
<main>

<section class="page-hero section-sm">
  <div class="page-hero-grid" aria-hidden="true"></div>
  <div class="page-hero-glow" aria-hidden="true"></div>
  <div class="wrap">
    <div class="eyebrow reveal" style="justify-content:center">Client Portal</div>
    <h1 class="section-heading reveal">Welcome <span class="gradient-text">Back</span></h1>
  </div>
</section>

<section class="section-sm">
  <div class="auth-wrap">
    <div class="auth-card card reveal">
      <div class="auth-error" id="login-error"><i class="fas fa-exclamation-circle"></i><span id="login-error-msg"></span></div>

      <form id="login-form">
        <div class="fg">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="fg">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <i class="fas fa-arrow-right-to-bracket"></i>
          <span class="btn-label">Log In</span>
          <span class="btn-sending" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Logging in…</span>
        </button>
      </form>

      <div class="auth-foot">
        Don't have an account? <a href="/pages/signup/">Create one</a>
      </div>
    </div>
  </div>
</section>

</main>
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="/assets/js/supabase-client.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
<script src="../../nav-footer.js" defer></script>
<script src="../../main.js" defer></script>
<script src="login.js" defer></script>
</body>
</html>
