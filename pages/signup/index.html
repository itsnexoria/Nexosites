<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up | NexoSites Client Portal</title>
  <meta name="description" content="Create your NexoSites client account to request a quote, track your project, and message your developer directly."/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="canonical" href="https://nexosites.xyz/pages/signup/"/>
  <link rel="icon" href="/assets/icons/logo.png" type="image/png"/>
  <link rel="apple-touch-icon" href="/assets/icons/logo.png"/>
  <link rel="manifest" href="/site.webmanifest"/>
  <meta name="theme-color" content="#6c47ff"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="../../style.css"/>
  <link rel="stylesheet" href="../inner.css"/>
  <link rel="stylesheet" href="/assets/css/app.css"/>
</head>
<body>

<div id="loader" role="status" aria-label="Loading NexoSites"><div class="loader-logo-wrap"><div class="loader-ring"></div><div class="loader-ring-2"></div><img src="/assets/icons/logo.png" alt="" class="loader-logo-img" aria-hidden="true"/></div><div class="loader-wordmark">NEXOSITES</div><div class="loader-track"><div class="loader-fill"></div></div></div>
<div id="nav-placeholder"></div>
<main>

<section class="page-hero section-sm">
  <div class="page-hero-grid" aria-hidden="true"></div>
  <div class="page-hero-glow" aria-hidden="true"></div>
  <div class="wrap">
    <div class="eyebrow reveal" style="justify-content:center">Client Portal</div>
    <h1 class="section-heading reveal">Create Your <span class="gradient-text">Account</span></h1>
  </div>
</section>

<section class="section-sm">
  <div class="auth-wrap">
    <div class="auth-card card reveal">
      <div class="auth-error" id="signup-error"><i class="fas fa-exclamation-circle"></i><span id="signup-error-msg"></span></div>
      <div class="auth-success" id="signup-success"><i class="fas fa-check-circle"></i><span>Account created! Check your email to confirm, then log in.</span></div>

      <form id="signup-form">
        <div class="form-row">
          <div class="fg">
            <label for="full_name">Your Name *</label>
            <input type="text" id="full_name" name="full_name" placeholder="John Smith" required autocomplete="name"/>
          </div>
          <div class="fg">
            <label for="company_name">Business Name</label>
            <input type="text" id="company_name" name="company_name" placeholder="My Business" autocomplete="organization"/>
          </div>
        </div>
        <div class="fg">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email"/>
        </div>
        <div class="fg">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="signup-btn">
          <i class="fas fa-user-plus"></i>
          <span class="btn-label">Create Account</span>
          <span class="btn-sending" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Creating…</span>
        </button>
      </form>

      <div class="auth-foot">
        Already have an account? <a href="/pages/login/">Log in</a>
      </div>
    </div>
  </div>
</section>

</main>
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="/assets/js/supabase-client.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
<script src="../../nav-footer.js" defer></script>
<script src="../../main.js" defer></script>
<script src="signup.js" defer></script>
</body>
</html>
